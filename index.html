<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Med Plus+ | Gestão de Contratos</title>
    <link rel="shortcut icon" href="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEjoAWfc_MdJ1u6ZR9tQUKGc0flOXPwWd7W424PEuyD8nzSX72a4gKdBx7ywmA_iMsF50xeXEaiURC6f0crnE1lzWB6XzFCXBMzzi_GTGUg09qhItoHz6hdwogG9UDO46VfgyG0dYpbAZIuYSviGlVnCsHiTZZightYwq7ewpnw3WnuPGbjd1-0ajWRUBwCU/w400-h400/favicon-medplus.webp" alt="Favicon-MedPlus" type="image/x-icon">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Camada de Carregamento -->
    <div id="preloader">
        <div class="loader-content">
            <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEgywsdWKH6rlDURrDoENalBtkXnhxike5bP4lesilVl-vBhsPrYmIIDLESb8VpR1e6AcRyxgXcyW8snNH4tSyIaJmTizACfOeqQYUjoaXhPE0MmMlHigietjYjKFLpEx5lccR3l10Q5RBwQMNBG8ENz6rAsMubobIyLRZa5DOLpWFtkMEH0Bx8_2LPVZFmb/s16000/logotipo-med-plus2025-1.png" alt="Logo MedPlus">
            <div class="spinner"></div>
        </div>
    </div>

    <div class="bg-image"></div>

    <div class="home-container">
        <h1 class="logo-text">Med Plus+</h1>
        <p class="subtitle">Gestão de Contratos</p>
        <div class="action-buttons">
            <button class="btn-futuristic" onclick="openModal('modalPesquisa')">
                <span class="btn-text">🔍 Pesquisa</span>
            </button>
            <button class="btn-futuristic" onclick="openModal('modalCadastro')">
                <span class="btn-text">📋 Cadastro</span>
            </button>
        </div>
    </div>

    <!-- ================= -->
    <!-- INÍCIO DOS MODAIS -->
    <!-- ================= -->

    <!-- MODAL CADASTRO -->
    <div id="modalCadastro" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Cadastro de Cliente</h2>
                <button class="close-btn" onclick="closeModal('modalCadastro')">&times;</button>
            </div>
            
            <div class="modal-body">
                <form id="formCadastro">
                    <div class="input-group">
                        <label>Código do Cliente (Automático)</label>
                        <input type="text" id="cadCodigo" readonly class="readonly-input">
                    </div>

                    <div class="input-group">
                        <label>Cliente</label>
                        <input type="text" id="cadCliente" required placeholder="Nome completo ou Razão Social">
                    </div>

                    <div class="radio-group">
                        <label><input type="radio" name="tipoDoc" value="CNPJ" checked onchange="toggleDocType()"> CNPJ</label>
                        <label><input type="radio" name="tipoDoc" value="CPF" onchange="toggleDocType()"> CPF</label>
                    </div>

                    <div class="input-group">
                        <label id="lblDoc">CNPJ</label>
                        <input type="text" id="cadDoc" required placeholder="00.000.000/0000-00" oninput="maskDoc(this)">
                    </div>

                    <div class="input-group">
                        <label>Nome Fantasia</label>
                        <input type="text" id="cadFantasia">
                    </div>

                    <div class="input-group">
                        <label>Equipamento (Ex: CR30-X, Drystar...)</label>
                        <input type="text" id="cadEquipamento" required>
                    </div>

                    <div class="input-group">
                        <label>Tipo de Contrato</label>
                        <select id="cadTipoContrato" required>
                            <option value="">Selecione...</option>
                            <option value="COMPLETO">COMPLETO</option>
                            <option value="CONTRATO M.O">CONTRATO M.O</option>
                            <option value="IMPRESSORA FRANQUIA 200fls">IMPRESSORA FRANQUIA 200fls</option>
                            <option value="IMPRESSORA FRANQUIA 300fls">IMPRESSORA FRANQUIA 300fls</option>
                            <option value="LOCAÇÃO CR DX-M E NOBREAK">LOCAÇÃO CR DX-M E NOBREAK</option>
                            <option value="LOCAÇÃO DO SISTEMA PACS">LOCAÇÃO DO SISTEMA PACS</option>
                            <option value="LOCAÇÃO DR">LOCAÇÃO DR</option>
                            <option value="LOCAÇÃO DR (USADA)">LOCAÇÃO DR (USADA)</option>
                            <option value="M.O PARCIAL PEÇAS">M.O PARCIAL PEÇAS</option>
                            <option value="PLUS">PLUS</option>
                            <option value="PREVENTIVA">PREVENTIVA</option>
                            <option value="SISTEMA PACS">SISTEMA PACS</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Endereço de Instalação</label>
                        <input type="text" id="cadEndereco" required>
                    </div>

                    <div class="input-group">
                        <label>Franquia / Mês</label>
                        <input type="text" id="cadFranquia">
                    </div>

                    <div class="input-group">
                        <label>Contato (Nome)</label>
                        <input type="text" id="cadContato" required>
                    </div>

                    <div class="input-group">
                        <label>Telefone</label>
                        <input type="text" id="cadTelefone" required placeholder="(00) 00000-0000" oninput="maskPhone(this)" maxlength="15">
                    </div>

                    <div class="input-group">
                        <label>Data para Renovação</label>
                        <input type="date" id="cadDataRenovacao" required>
                    </div>

                    <div class="input-group">
                        <label>Cancelamento</label>
                        <input type="date" id="cadCancelamento">
                    </div>

                    <div class="input-group">
                        <label>Comprovantes (Link ou Arquivo)</label>
                        <input type="text" id="cadComprovantes" placeholder="Link do Drive ou caminho">
                    </div>

                    <div class="input-group">
                        <label>Tipo de Cobrança</label>
                        <select id="cadTipoCobranca">
                            <option value="">Selecione...</option>
                            <option value="FRANQUIA MENSAL/EXCETENTE">FRANQUIA MENSAL/EXCETENTE</option>
                            <option value="MENSAL">MENSAL</option>
                            <option value="POR EXAME">POR EXAME</option>
                        </select>
                    </div>

                    <div class="input-group">
                        <label>Status</label>
                        <select id="cadStatus"> <option value="">Selecione...</option>
                            <option value="Ativo">Ativo</option>
                            <option value="Cancelado">Cancelado</option>
                        </select>
                    </div>

                </form>
            </div>

            <div class="modal-footer">
                <button type="button" class="btn-futuristic btn-secondary" onclick="limparCadastro()">
                    <span class="btn-text">🧹 Limpar</span>
                </button>
                <button type="button" class="btn-futuristic" onclick="salvarCadastro()">
                    <span class="btn-text">💾 Cadastrar</span>
                </button>
            </div>
        </div>
    </div>

    <!-- MODAL PESQUISA -->
    <div id="modalPesquisa" class="modal-overlay">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h2>Pesquisa de Contratos</h2>
                <button class="close-btn" onclick="closeModal('modalPesquisa')">&times;</button>
            </div>
            
            <div class="modal-body search-layout">
                <div class="search-header">
                    <div class="search-filters">
                        <!-- <div class="input-group filter-group">
                            <label>Filtrar por:</label>
                            <select id="filtroTipo" onchange="mudarFiltro()">
                                <option value="">Selecione...</option>
                                <option value="Cidade">Cidade</option>
                                <option value="Cliente">Cliente</option>
                                <option value="CNPJ">CNPJ</option>
                                <option value="ClienteCPF">CPF</option>
                                <option value="NomeFantasia">Nome Fantasia</option>
                                <option value="TipoContrato">Tipo de Contrato</option>
                            </select>
                        </div> -->
                        <div class="input-group search-input-group">
                            <label>Termo da Pesquisa</label>
                            <div class="search-bar-wrapper">
                                <input type="text" id="termoPesquisa" placeholder="Digite para buscar..." oninput="maskPesquisa(this)">
                                <img src="https://blogger.googleusercontent.com/img/b/R29vZ2xl/AVvXsEi7lqTk0kvr-XxGAna0dIgj12gkj3Sphg-voAps0xDTEWDisO7xaziUn5wkhzr3c6pmy7x6UscQW5m-SliDB7MUqyq7MTur9etcluCAWyZ4w883e6pHKrBB3bf8JV3jOr5vrN02yGIYEmukMlZ7qNu4nj5xZlg-5ypanVRd6ymhmH_s68jMDbnmDGhAKRH4/w320-h320/icone-funil.webp" alt="Limpar Filtro" class="filter-icon" onclick="limparPesquisa()" title="Limpar Pesquisa">
                            </div>
                        </div>
                    </div>
                </div>

                <div class="search-results">
                <div class="table-wrapper"> <table class="futuristic-table">
                        <thead>
                            <tr>
                                <th>AÇÕES</th>
                                <th class="sortable" onclick="ordenarTabela(this, 'CÓDIGO')">CÓDIGO</th>
                                <th class="sortable" onclick="ordenarTabela(this, 'CLIENTE')">CLIENTE</th>
                                <th class="sortable" onclick="ordenarTabela(this, 'DOCUMENTO')">DOCUMENTO</th>
                                <th class="sortable" onclick="ordenarTabela(this, 'NOME_FANTASIA')">NOME FANTASIA</th>
                                <th class="sortable" onclick="ordenarTabela(this, 'EQUIPAMENTO')">EQUIPAMENTO</th>
                                <th class="sortable" onclick="ordenarTabela(this, 'TIPO_CONTRATO')">TIPO_CONTRATO</th>
                                <th class="sortable" onclick="ordenarTabela(this, 'ENDERECO_INSTALACAO')">ENDERECO_INSTALACAO</th>
                                <th class="sortable" onclick="ordenarTabela(this, 'FRANQUIA_MES')">FRANQUIA_MES</th>
                                <th class="sortable" onclick="ordenarTabela(this, 'CONTATO')">CONTATO</th>
                                <th class="sortable" onclick="ordenarTabela(this, 'TELEFONE')">TELEFONE</th>
                                <th class="sortable" onclick="ordenarTabela(this, 'DATA_RENOVACAO')">DATA_RENOVACAO</th>
                                <th class="sortable" onclick="ordenarTabela(this, 'CANCELAMENTO')">CANCELAMENTO</th>
                                <th class="sortable" onclick="ordenarTabela(this, 'COMPROVANTES')">COMPROVANTES</th>
                                <th class="sortable" onclick="ordenarTabela(this, 'TIPO_COBRANCA')">TIPO_COBRANCA</th>
                                <th class="sortable" onclick="ordenarTabela(this, 'STATUS')">STATUS</th>
                                <th>INADIMPLENTE</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaResultados">
                            </tbody>
                    </table>
                </div>
            </div>           
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
